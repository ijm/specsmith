[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=verification_protocol --cov-report=term-missing

[coverage:run]
source = verification_protocol
omit = 
    */tests/*
    */__pycache__/*

[coverage:report]
show_missing = True
skip_covered = True

[flake8]
max-line-length = 88
extend-ignore = E203, E266, E501, W503
per-file-ignores =
    # Allow import * in __init__.py
    __init__.py: F403,F401
    # Allow pytest fixtures
    tests/*.py: E501,F811
